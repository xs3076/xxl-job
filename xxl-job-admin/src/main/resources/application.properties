### web
server.port=${XXL_JOB_PORT:8080}
server.servlet.context-path=${XXL_JOB_CONTEXT_PATH:/xxl-job-admin}

### actuator
management.endpoints.web.base-path=/actuator
management.health.mail.enabled=false

### resources
spring.mvc.servlet.load-on-startup=0
spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/

### freemarker
spring.freemarker.templateLoaderPath=classpath:/templates/
spring.freemarker.suffix=.ftl
spring.freemarker.charset=UTF-8
spring.freemarker.request-context-attribute=request
spring.freemarker.settings.number_format=0.##########
spring.freemarker.settings.new_builtin_class_resolver=safer

### mybatis
mybatis.mapper-locations=classpath:/mapper/*Mapper.xml

### datasource-pool
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.minimum-idle=${XXL_JOB_DATASOURCE_MIN_IDLE:10}
spring.datasource.hikari.maximum-pool-size=${XXL_JOB_DATASOURCE_MAX_POOL_SIZE:30}
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.idle-timeout=${XXL_JOB_DATASOURCE_IDLE_TIMEOUT:30000}
spring.datasource.hikari.pool-name=HikariCP
spring.datasource.hikari.max-lifetime=${XXL_JOB_DATASOURCE_MAX_LIFETIME:900000}
spring.datasource.hikari.connection-timeout=${XXL_JOB_DATASOURCE_CONNECTION_TIMEOUT:10000}
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=1000

### xxl-job, datasource
spring.datasource.url=${XXL_JOB_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/xxl_job}
spring.datasource.username=${XXL_JOB_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${XXL_JOB_DATASOURCE_PASSWORD:postgres_pwd}
spring.datasource.driver-class-name=${XXL_JOB_DATASOURCE_DRIVER:org.postgresql.Driver}

### xxl-job, email
spring.mail.host=${XXL_JOB_MAIL_HOST:smtp.qq.com}
spring.mail.port=${XXL_JOB_MAIL_PORT:25}
spring.mail.username=${XXL_JOB_MAIL_USERNAME:xxx@qq.com}
spring.mail.from=${XXL_JOB_MAIL_FROM:xxx@qq.com}
spring.mail.password=${XXL_JOB_MAIL_PASSWORD:xxx}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

### xxl-job, access token
xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN:default_token}

### xxl-job, timeout by second, default 3s
xxl.job.timeout=${XXL_JOB_TIMEOUT:3}

### xxl-job, i18n (default is zh_CN, and you can choose "zh_CN", "zh_TC" and "en")
xxl.job.i18n=${XXL_JOB_I18N:zh_CN}

## xxl-job, triggerpool max size
xxl.job.triggerpool.fast.max=${XXL_JOB_TRIGGERPOOL_FAST_MAX:300}
xxl.job.triggerpool.slow.max=${XXL_JOB_TRIGGERPOOL_SLOW_MAX:200}

## xxl-job, schedule batch size
xxl.job.schedule.batchsize=${XXL_JOB_SCHEDULE_BATCHSIZE:100}

### xxl-job, log retention days
xxl.job.logretentiondays=${XXL_JOB_LOG_RETENTION_DAYS:30}

### xxl-sso
xxl-sso.token.key=${XXL_JOB_SSO_TOKEN_KEY:xxl_job_login_token}
xxl-sso.token.timeout=${XXL_JOB_SSO_TOKEN_TIMEOUT:604800000}
xxl-sso.client.excluded.paths=${XXL_JOB_SSO_EXCLUDED_PATHS:}
xxl-sso.client.login.path=${XXL_JOB_SSO_LOGIN_PATH:/auth/login}
