# docker-compose version
version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: xxl-job-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: xxl_job
    ports:
      - "5432:5432"
    volumes:
      # 说明：仅数据库首次初始化时执行；
      - ../doc/db/tables_xxl_job.sql:/docker-entrypoint-initdb.d/tables_xxl_job.sql:ro
      # 数据库持久化目录位置，建议自定义：
      - ${POSTGRES_PATH}/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      timeout: 20s
      retries: 10
    networks:
      - xxl-job-network

  xxl-job-admin:
    # 本地Build设置，如果期望使用推动DockerHub的镜像，可以注释当前启用的image、build配置，并启用如下设置版本的image配置；
    #image: xuxueli/xxl-job-admin:{version}
    image: xuxueli/xxl-job-admin:local
    build:
      context: ../xxl-job-admin
      dockerfile: Dockerfile
    container_name: xxl-job-admin
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:postgresql://postgres:5432/xxl_job
        --spring.datasource.username=${POSTGRES_USER}
        --spring.datasource.password=${POSTGRES_PASSWORD}
        --spring.datasource.driver-class-name=org.postgresql.Driver
        --server.port=${XXL_JOB_ADMIN_PORT}
        --server.servlet.context-path=${XXL_JOB_ADMIN_CONTEXT_PATH}
    ports:
      - "${XXL_JOB_ADMIN_PORT}:${XXL_JOB_ADMIN_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xxl-job-network

  xxl-job-executor-sample-springboot:
    image: xuxueli/xxl-job-executor-sample-springboot:local
    build:
      context: ./xxl-job-executor-samples/xxl-job-executor-sample-springboot
      dockerfile: Dockerfile
    container_name: xxl-job-executor-sample-springboot
    environment:
      PARAMS: >-
        --xxl.job.admin.addresses=http://xxl-job-admin:${XXL_JOB_ADMIN_PORT}${XXL_JOB_ADMIN_CONTEXT_PATH:-/}
    ports:
      - "9999:9999"
    depends_on:
      xxl-job-admin:
        condition: service_started
    networks:
      - xxl-job-network

networks:
  xxl-job-network:
    driver: bridge
