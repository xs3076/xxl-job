name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: '镜像名称（如 xxx/xxl-job-admin）'
        required: true
        default: 'xxx/xxl-job-admin'

env:
  REGISTRY: registry.cn-shanghai.aliyuncs.com
  IMAGE_TAG: "1.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package -pl xxl-job-admin -am -DskipTests

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./xxl-job-admin
          file: xxl-job-admin/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.event.inputs.image_name || 'xxx/xxl-job-admin' }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.event.inputs.image_name || 'xxx/xxl-job-admin' }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
